<ion-item class="language-switcher" lines="none">
  <ion-label>Idioma</ion-label>
  <ion-select
    interface="popover"
    [value]="languageService.currentLanguage"
    (ionChange)="changeLanguage($event.detail.value)"
  >
    <ion-select-option value="es">Español</ion-select-option>
    <ion-select-option value="en">Inglés</ion-select-option>
  </ion-select>
</ion-item>
